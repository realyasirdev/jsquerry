<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <!-- Include jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <h2>My To-Do List</h2>
        <div class="input-container">
            <input type="text" id="task-input" placeholder="Add new task...">
            <button id="add-btn">+</button>
        </div>
        <ul id="task-list">
            <!-- Tasks will be appended here dynamically -->
            <li><input type="checkbox">Learn jQuery selectors<span class="delete">X</span></li>
            <li class="completed"><input type="checkbox" checked>Setup project environment<span class="delete">X</span></li>
        </ul>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
